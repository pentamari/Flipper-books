name: Build and Release

on:
  push:
    branches: [main, master, "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish a release for (e.g. v1.0.0)."
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build FAP (Momentum)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow for EPUB converter
        run: |
          python -m pip install --upgrade pip
          python -m pip install Pillow

      - name: Install ufbt
        run: |
          python -m pip install --upgrade ufbt

      - name: Fetch Momentum SDK
        run: |
          ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release

      - name: Build FAP
        run: ufbt

      - name: Stage artifacts
        run: |
          mkdir -p stage
          find dist -maxdepth 3 -type f -name "*.fap" -exec cp {} stage/ \;
          cp tools/epub_to_fbook.py stage/
          cp README.md stage/ 2>/dev/null || true
          ls -la stage/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flipper-books-${{ github.sha }}
          path: stage/
          if-no-files-found: error

      - name: Determine release parameters
        id: rel
        shell: bash
        run: |
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            name="Books $tag"
            prerelease=false
          elif [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
            name="Books $tag"
            prerelease=false
          else
            tag="latest"
            name="Books latest build (#${{ github.run_number }})"
            prerelease=true
          fi
          echo "tag=$tag"                >> "$GITHUB_OUTPUT"
          echo "name=$name"              >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease"  >> "$GITHUB_OUTPUT"

      - name: Move rolling tag (latest only)
        if: steps.rel.outputs.tag == 'latest' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create / update GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          prerelease: ${{ steps.rel.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            stage/*.fap
            stage/epub_to_fbook.py
